[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "zerotrust-agents-sdk"
version = "0.1.0"
description = "Official Python SDK for ZeroTrust Agents Control Plane API"
authors = ["Lokesh Shukla <hello@zerotrust-agents.com>"]
readme = "README.md"
packages = [{include = "zerotrust_agents"}]

[tool.poetry.dependencies]
python = "^3.8"
httpx = "^0.27.0"
typer = {extras = ["all"], version = "^0.15.1"}
rich = "^13.7.0"
pyyaml = "^6.0.1"

[tool.poetry.scripts]
zta = "zerotrust_agents.cli:app"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
